preset = "tokyo-night"

# OmniWM is a fork of AeroSpace — try the aerospace path first.
# If spaces widget doesn't show workspaces, check `which omniwm` and update this path.
aerospace.path = "/opt/homebrew/bin/omniwm"

[widgets]
displayed = [
    "default.spaces",
    "divider",
    "default.activeapp",
    "spacer",
    "default.systemmonitor",
    "default.network",
    "default.battery",
    "default.volume",
    "divider",
    "default.time",
]

[widgets.default.time]
format = "E d MMM, H:mm"
calendar.show-events = false

[widgets.default.battery]
show-percentage = true

[widgets.default.spaces]
space.show-key = true
window.show-title = true

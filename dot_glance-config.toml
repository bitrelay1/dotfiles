preset = "tokyo-night"

[widgets]
displayed = [
    "default.spaces",
    "divider",
    "default.activeapp",
    "spacer",
    "default.systemmonitor",
    "default.network",
    "default.battery",
    "default.volume",
    "divider",
    "default.time",
]

[widgets.default.time]
format = "E d MMM, H:mm"
calendar.show-events = false

[widgets.default.battery]
show-percentage = true

[widgets.default.spaces]
space.show-key = true
window.show-title = true

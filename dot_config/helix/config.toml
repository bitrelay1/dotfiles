# Helix editor configuration
# See https://docs.helix-editor.com/configuration.html

[editor]
line-number = "relative"
mouse = true
true-color = true
cursorline = true
color-modes = true
bufferline = "always"

[editor.statusline]
left = ["mode", "spinner", "file-name"]
center = ["file-modification-indicator", "version-control"]
right = ["diagnostics", "selections", "position", "file-encoding"]

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.soft-wrap]
enable = true

[editor.lsp]
enable = true
display-messages = true
auto-signature-help = true
display-signature-help-docs = true

# Theme (adjust based on preference)
# theme = "dark_plus"

[keys.normal]
S-l = ":buffer-next"
S-h = ":buffer-previous"

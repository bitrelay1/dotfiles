# AeroSpace configuration
# Simple keybinding scheme: Cmd for workspace/app, Cmd+Shift for move, h/j/k/l for directional

[mode.main.binding]
    # Workspace navigation (cycle through workspaces)
    cmd-u = 'focus-workspace prev'
    cmd-i = 'focus-workspace next'

    # Window focus (directional)
    cmd-h = 'focus left'
    cmd-j = 'focus down'
    cmd-k = 'focus up'
    cmd-l = 'focus right'
    cmd-tab = 'focus-view next'

    # Move window within workspace (directional)
    cmd-shift-h = 'move left'
    cmd-shift-j = 'move down'
    cmd-shift-k = 'move up'
    cmd-shift-l = 'move right'

    # Move window to different workspace
    cmd-shift-u = 'move-node-to-workspace prev'
    cmd-shift-i = 'move-node-to-workspace next'

    # Move window to monitor
    cmd-m = 'move-node-to-monitor next'

    # Layout and sizing
    cmd-f = 'fullscreen toggle'
    cmd-t = 'layout-toggle all'
    cmd-e = 'balance-sizes'
    cmd-minus = 'resize width -50'
    cmd-equal = 'resize width +50'

    # Launch applications
    cmd-enter = 'exec-and-forget open -a Ghostty'

    # Close window
    cmd-w = 'close'

    # Overview (Mission Control)
    cmd-o = 'exec-and-forget open -a Mission\\ Control'

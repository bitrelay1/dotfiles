# Hyprspace window manager configuration
# Hyprspace is a fork of Aerospace with niri-like features
# See: https://github.com/hyprspace/hyprspace

# Monitor/workspace setup
monitor = ,preferred,auto,auto

# General settings
general {
    # Focus follows mouse
    focus-follows-mouse = true

    # Number of workspaces
    workspaces = 9

    # Gaps and borders
    gaps = 8
    border-width = 2
}

# Keybindings
# mod = Super key
# Basic navigation: Super + hjkl or arrow keys
bind = Super, H, movefocus, l
bind = Super, J, movefocus, d
bind = Super, K, movefocus, u
bind = Super, L, movefocus, r

# Resize windows
bind = Super Shift, H, resizeactive, -50 0
bind = Super Shift, J, resizeactive, 0 50
bind = Super Shift, K, resizeactive, 0 -50
bind = Super Shift, L, resizeactive, 50 0

# Move windows
bind = Super Ctrl, H, movewindow, l
bind = Super Ctrl, J, movewindow, d
bind = Super Ctrl, K, movewindow, u
bind = Super Ctrl, L, movewindow, r

# Workspace navigation
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9

# Move window to workspace
bind = Super Shift, 1, movetoworkspace, 1
bind = Super Shift, 2, movetoworkspace, 2
bind = Super Shift, 3, movetoworkspace, 3
bind = Super Shift, 4, movetoworkspace, 4
bind = Super Shift, 5, movetoworkspace, 5
bind = Super Shift, 6, movetoworkspace, 6
bind = Super Shift, 7, movetoworkspace, 7
bind = Super Shift, 8, movetoworkspace, 8
bind = Super Shift, 9, movetoworkspace, 9

# Terminal (Ghostty)
bind = Super, T, exec, ghostty

# Launch applications
bind = Super, Space, exec, fuzzel  # App launcher (install fuzzel for menu)

# Close window
bind = Super, Q, killactive

# Fullscreen
bind = Super, F, fullscreen, 0

# Toggle floating
bind = Super, V, togglefloating

# Reload config
bind = Super Shift, C, reload

# Exit hyprspace
bind = Super Shift, E, exit

# Dropdown terminal (Ghostty)
# Note: This requires ghostty to support dropdown mode
bind = Super, grave, exec, ghostty --class=ghostty_dropdown

# Window rules
windowrule = float,class:ghostty_dropdown
windowrule = size 80% 60%,class:ghostty_dropdown
windowrule = center,class:ghostty_dropdown

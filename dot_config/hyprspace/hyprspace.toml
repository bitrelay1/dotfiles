# Hyprspace configuration
# Hyprspace is a fork of AeroSpace and uses TOML format
# Verify options against: https://github.com/nickkadutskyi/HyprSpace

start-at-login = true

[mode.main.binding]
# Focus
cmd-h = 'focus left'
cmd-j = 'focus down'
cmd-k = 'focus up'
cmd-l = 'focus right'

# Move window
cmd-shift-h = 'move-node-to-monitor --wrap-around left'
cmd-shift-j = 'move-node-to-monitor --wrap-around down'
cmd-shift-k = 'move-node-to-monitor --wrap-around up'
cmd-shift-l = 'move-node-to-monitor --wrap-around right'

# Workspaces
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

# Move window to workspace
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'
